# docker-compose.yml - kankanews HLS Proxy
#
# 用法:
#
#   拉取预构建镜像
#   docker compose up -d
#
#   本地构建
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build

services:
  kk-proxy:
    image: ${IMAGE:-ghcr.io/c0nef/kankenews-hls-proxy:latest}
    container_name: kk-hls-proxy
    restart: unless-stopped
    ports:
      - "${PORT:-53535}:53535"
    environment:
      - CHANNEL_ID=${CHANNEL_ID:-10}
      - CHANNEL_IDS=${CHANNEL_IDS:-1,2,4,5,9,10,11,12}
      - PORT=53535
      - CAPTURE_INTERVAL=${CAPTURE_INTERVAL:-36000000}
      - ALLOWED_SEGMENT_HOSTS=${ALLOWED_SEGMENT_HOSTS:-volc-stream.kksmg.com}
      - EXPOSE_RAW_URL=${EXPOSE_RAW_URL:-0}
      # 缓存限制 (防止内存溢出)
      - MAX_CACHE_SIZE=${MAX_CACHE_SIZE:-1073741824}
      - MAX_CACHE_AGE=${MAX_CACHE_AGE:-1800}
    volumes:
      - kk-data:/app/data
      - kk-cache:/app/seg-cache
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ["CMD", "node", "src/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  kk-data:
  kk-cache:
